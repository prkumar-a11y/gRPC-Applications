<VirtualHost *:443>
    ServerName grpc-service-apache-origin.qa.akamai.com

    SSLEngine on
    SSLCertificateFile /etc/ssl/grpc-services/grpc-service-apache-origin.qa.akamai.com.crt
    SSLCertificateKeyFile /etc/ssl/grpc-services/grpc-service-apache-origin.qa.akamai.com.key

    Protocols h2 http/1.1
    SSLProxyEngine on
    ProxyPreserveHost On

    # Shared-host gRPC routing. Reflection and generic gRPC health are omitted
    # here because those well-known paths would collide across multiple backends.
    ProxyPass "/chat.ChatService/" "h2c://127.0.0.1:50051/chat.ChatService/"
    ProxyPassReverse "/chat.ChatService/" "h2c://127.0.0.1:50051/chat.ChatService/"

    ProxyPass "/stockticker.StockTickerService/" "h2c://127.0.0.1:50053/stockticker.StockTickerService/"
    ProxyPassReverse "/stockticker.StockTickerService/" "h2c://127.0.0.1:50053/stockticker.StockTickerService/"

    ProxyPass "/joborchestrator.JobOrchestrator/" "h2c://127.0.0.1:50055/joborchestrator.JobOrchestrator/"
    ProxyPassReverse "/joborchestrator.JobOrchestrator/" "h2c://127.0.0.1:50055/joborchestrator.JobOrchestrator/"

    RedirectMatch 302 ^/$ /chat-service/
    RedirectMatch 302 ^/chat-service$ /chat-service/
    RedirectMatch 302 ^/stock-ticker$ /stock-ticker/
    RedirectMatch 302 ^/job-orchestrator$ /job-orchestrator/

    ProxyPass "/chat-service/api/" "http://127.0.0.1:8080/chat-service/api/"
    ProxyPassReverse "/chat-service/api/" "http://127.0.0.1:8080/chat-service/api/"
    ProxyPass "/chat-service/healthz" "http://127.0.0.1:8080/chat-service/healthz"
    ProxyPassReverse "/chat-service/healthz" "http://127.0.0.1:8080/chat-service/healthz"
    ProxyPass "/chat-service/" "http://127.0.0.1:8080/chat-service/"
    ProxyPassReverse "/chat-service/" "http://127.0.0.1:8080/chat-service/"

    ProxyPass "/stock-ticker/api/" "http://127.0.0.1:8081/api/"
    ProxyPassReverse "/stock-ticker/api/" "http://127.0.0.1:8081/api/"
    ProxyPass "/stock-ticker/healthz" "http://127.0.0.1:8081/healthz"
    ProxyPassReverse "/stock-ticker/healthz" "http://127.0.0.1:8081/healthz"
    ProxyPass "/stock-ticker/" "http://127.0.0.1:8081/"
    ProxyPassReverse "/stock-ticker/" "http://127.0.0.1:8081/"

    ProxyPass "/job-orchestrator/api/" "http://127.0.0.1:8082/api/"
    ProxyPassReverse "/job-orchestrator/api/" "http://127.0.0.1:8082/api/"
    ProxyPass "/job-orchestrator/healthz" "http://127.0.0.1:8082/healthz"
    ProxyPassReverse "/job-orchestrator/healthz" "http://127.0.0.1:8082/healthz"
    ProxyPass "/job-orchestrator/" "http://127.0.0.1:8082/"
    ProxyPassReverse "/job-orchestrator/" "http://127.0.0.1:8082/"

    ErrorLog ${APACHE_LOG_DIR}/grpc-services-error.log
    CustomLog ${APACHE_LOG_DIR}/grpc-services-access.log combined
</VirtualHost>