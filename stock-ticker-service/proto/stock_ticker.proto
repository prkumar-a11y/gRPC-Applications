syntax = "proto3";

package stockticker;

service StockTickerService {
  rpc SubscribeToTicker(SubscribeRequest) returns (stream StockUpdate);
  rpc GetAvailableSymbols(GetSymbolsRequest) returns (GetSymbolsResponse);
  rpc GetCurrentPrice(GetPriceRequest) returns (GetPriceResponse);
}

message SubscribeRequest {
  string symbol = 1;
  string client_id = 2;
}

message StockUpdate {
  string symbol = 1;
  double price = 2;
  double change = 3;
  double change_percent = 4;
  int64 timestamp = 5;
  int64 volume = 6;
  string market_status = 7;
}

message GetSymbolsRequest {}

message StockSymbol {
  string symbol = 1;
  string company_name = 2;
  string sector = 3;
  double base_price = 4;
}

message GetSymbolsResponse {
  repeated StockSymbol symbols = 1;
}

message GetPriceRequest {
  string symbol = 1;
}

message GetPriceResponse {
  StockUpdate current_price = 1;
  bool success = 2;
  string error_message = 3;
}