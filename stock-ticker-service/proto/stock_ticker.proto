syntax = "proto3";

package stockticker;

service StockTickerService {
  rpc SubscribeToTicker(SubscribeRequest) returns (stream StockUpdate);
  rpc GetAvailableSymbols(GetSymbolsRequest) returns (GetSymbolsResponse);
  rpc GetCurrentPrice(GetPriceRequest) returns (GetPriceResponse);
}

message SubscribeRequest {
  string symbol = 1;
  string client_id = 2;
}

message StockUpdate {
  string symbol = 1;
  double price = 2;
  double change = 3;
  double change_percent = 4;
  int64 timestamp = 5;
  int64 volume = 6;
  string market_status = 7;
}

message GetSymbolsRequest {}

message StockSymbol {
  string symbol = 1;
  string company_name = 2;
  string sector = 3;
  double base_price = 4;
}

message GetSymbolsResponse {
  repeated StockSymbol symbols = 1;
}

message GetPriceRequest {
  string symbol = 1;
}

message GetPriceResponse {
  StockUpdate current_price = 1;
  bool success = 2;
  string error_message = 3;
}syntax = "proto3";

package stockticker;

option go_package = "github.com/stock-ticker-service/proto;stockticker";

// The Stock Ticker service definition
service StockTickerService {
  // Subscribe to stock price updates for a given symbol
  rpc SubscribeToTicker(SubscribeRequest) returns (stream StockUpdate);
  
  // Get list of available stock symbols
  rpc GetAvailableSymbols(GetSymbolsRequest) returns (GetSymbolsResponse);
  
  // Get current price for a specific symbol
  rpc GetCurrentPrice(GetPriceRequest) returns (GetPriceResponse);
}

// Request to subscribe to a stock ticker
message SubscribeRequest {
  string symbol = 1;          // Stock symbol (e.g., "AAPL", "GOOGL", "TSLA")
  string client_id = 2;       // Unique client identifier
}

// Stock price update message
message StockUpdate {
  string symbol = 1;          // Stock symbol
  double price = 2;           // Current price
  double change = 3;          // Price change from previous update
  double change_percent = 4;  // Percentage change
  int64 timestamp = 5;        // Unix timestamp
  int64 volume = 6;           // Trading volume (simulated)
  string market_status = 7;   // "OPEN", "CLOSED", "PRE_MARKET", "AFTER_HOURS"
}

// Request to get available symbols
message GetSymbolsRequest {}

// Response with available symbols
message GetSymbolsResponse {
  repeated StockSymbol symbols = 1;
}

// Request to get current price for a symbol
message GetPriceRequest {
  string symbol = 1;
}

// Response with current price
message GetPriceResponse {
  StockUpdate current_price = 1;
  bool success = 2;
  string error_message = 3;
}

// Stock symbol information
message StockSymbol {
  string symbol = 1;          // Symbol code (e.g., "AAPL")
  string company_name = 2;    // Company name (e.g., "Apple Inc.")
  string sector = 3;          // Business sector
  double base_price = 4;      // Starting price for simulation
}