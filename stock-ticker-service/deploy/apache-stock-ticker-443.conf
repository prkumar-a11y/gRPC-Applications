<VirtualHost *:443>
    ServerName stock-ticker.example.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/stock-ticker.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/stock-ticker.example.com/privkey.pem

    Protocols h2 http/1.1
    SSLProxyEngine on
    ProxyPreserveHost On

    ProxyPass "/stockticker.StockTickerService/" "h2c://127.0.0.1:50053/stockticker.StockTickerService/"
    ProxyPassReverse "/stockticker.StockTickerService/" "h2c://127.0.0.1:50053/stockticker.StockTickerService/"

    ProxyPass "/grpc.health.v1.Health/" "h2c://127.0.0.1:50053/grpc.health.v1.Health/"
    ProxyPassReverse "/grpc.health.v1.Health/" "h2c://127.0.0.1:50053/grpc.health.v1.Health/"

    ProxyPass "/grpc.reflection.v1alpha.ServerReflection/" "h2c://127.0.0.1:50053/grpc.reflection.v1alpha.ServerReflection/"
    ProxyPassReverse "/grpc.reflection.v1alpha.ServerReflection/" "h2c://127.0.0.1:50053/grpc.reflection.v1alpha.ServerReflection/"

    ProxyPass "/api/" "http://127.0.0.1:8080/api/"
    ProxyPassReverse "/api/" "http://127.0.0.1:8080/api/"

    ProxyPass "/healthz" "http://127.0.0.1:8080/healthz"
    ProxyPassReverse "/healthz" "http://127.0.0.1:8080/healthz"

    ProxyPass "/" "http://127.0.0.1:8080/"
    ProxyPassReverse "/" "http://127.0.0.1:8080/"

    ErrorLog ${APACHE_LOG_DIR}/stock-ticker-error.log
    CustomLog ${APACHE_LOG_DIR}/stock-ticker-access.log combined
</VirtualHost>