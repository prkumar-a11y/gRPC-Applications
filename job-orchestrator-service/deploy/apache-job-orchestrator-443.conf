<VirtualHost *:443>
    ServerName job-orchestrator.example.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/job-orchestrator.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/job-orchestrator.example.com/privkey.pem

    Protocols h2 http/1.1
    SSLProxyEngine on
    ProxyPreserveHost On

    ProxyPass "/joborchestrator.JobOrchestrator/" "h2c://127.0.0.1:50055/joborchestrator.JobOrchestrator/"
    ProxyPassReverse "/joborchestrator.JobOrchestrator/" "h2c://127.0.0.1:50055/joborchestrator.JobOrchestrator/"

    ProxyPass "/grpc.reflection.v1alpha.ServerReflection/" "h2c://127.0.0.1:50055/grpc.reflection.v1alpha.ServerReflection/"
    ProxyPassReverse "/grpc.reflection.v1alpha.ServerReflection/" "h2c://127.0.0.1:50055/grpc.reflection.v1alpha.ServerReflection/"

    RedirectMatch 302 ^/job-orchestrator$ /job-orchestrator/

    ProxyPass "/job-orchestrator/api/" "http://127.0.0.1:8082/api/"
    ProxyPassReverse "/job-orchestrator/api/" "http://127.0.0.1:8082/api/"

    ProxyPass "/job-orchestrator/healthz" "http://127.0.0.1:8082/healthz"
    ProxyPassReverse "/job-orchestrator/healthz" "http://127.0.0.1:8082/healthz"

    ProxyPass "/job-orchestrator/" "http://127.0.0.1:8082/"
    ProxyPassReverse "/job-orchestrator/" "http://127.0.0.1:8082/"

    ErrorLog ${APACHE_LOG_DIR}/job-orchestrator-error.log
    CustomLog ${APACHE_LOG_DIR}/job-orchestrator-access.log combined
</VirtualHost>