syntax = "proto3";

package chat;

option go_package = "github.com/grpc-applications/chat-service/pkg";

// The Chat service definition
service ChatService {
  // Join a chat room and receive messages
  rpc JoinRoom(JoinRoomRequest) returns (stream Message);
  
  // Send a message to a room
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  
  // Leave a chat room
  rpc LeaveRoom(LeaveRoomRequest) returns (LeaveRoomResponse);
  
  // Get list of active rooms
  rpc GetRooms(GetRoomsRequest) returns (GetRoomsResponse);
  
  // Get list of users in a specific room
  rpc GetRoomUsers(GetRoomUsersRequest) returns (GetRoomUsersResponse);
}

// Request to join a room
message JoinRoomRequest {
  string room_id = 1;
  string username = 2;
}

// Request to send a message
message SendMessageRequest {
  string room_id = 1;
  string username = 2;
  string content = 3;
}

// Response after sending a message
message SendMessageResponse {
  bool success = 1;
  string message_id = 2;
}

// Request to leave a room
message LeaveRoomRequest {
  string room_id = 1;
  string username = 2;
}

// Response after leaving a room
message LeaveRoomResponse {
  bool success = 1;
}

// A chat message
message Message {
  string message_id = 1;
  string room_id = 2;
  string username = 3;
  string content = 4;
  int64 timestamp = 5;
  MessageType type = 6;
}

// Message types
enum MessageType {
  USER_MESSAGE = 0;
  SYSTEM_MESSAGE = 1;
  USER_JOINED = 2;
  USER_LEFT = 3;
}

// Request to get rooms
message GetRoomsRequest {}

// Response with list of rooms
message GetRoomsResponse {
  repeated Room rooms = 1;
}

// Request to get users in a room
message GetRoomUsersRequest {
  string room_id = 1;
}

// Response with list of users in a room
message GetRoomUsersResponse {
  repeated User users = 1;
}

// Room information
message Room {
  string room_id = 1;
  string name = 2;
  int32 user_count = 3;
}

// User information
message User {
  string username = 1;
  int64 joined_at = 2;
}